<svg fill="none" width="1000" height="500" xmlns="http://www.w3.org/2000/svg">
 <foreignObject width="100%" height="100%">
  <div xmlns="http://www.w3.org/1999/xhtml" class="app">

      <style>
:root {
  --bg: #000;
  --text: #fff;
  --muted: #9ca3af;
  --gradient: linear-gradient(90deg, cyan, purple);
}

/* IMPORTANT: replace body with container root */
.app {
  font-family: Arial, sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 100%;
  height: 100%;
}

* {
  margin: 0;
  padding: 0;
  box-sizing: border-box;
}

/* Layout */
.container {
  max-width: 1200px;
  margin: auto;
  padding: 20px;
}

/* Header */
.header {
  background: black;
}

.nav {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

.logo {
  height: 36px;
}

.nav-links {
  display: flex;
  gap: 30px;
}

.nav-links a {
  color: var(--muted);
  text-decoration: none;
}

.nav-links a:hover {
  color: white;
}

.btn {
  padding: 10px 20px;
  border-radius: 999px;
  background: black;
  border: 1px solid transparent;
  position: relative;
  color: white;
  text-decoration: none;
}

.btn::before {
  content: "";
  position: absolute;
  inset: -2px;
  border-radius: 999px;
  background: var(--gradient);
  z-index: -1;
}

/* Mobile */
.menu-toggle {
  display: none;
  font-size: 24px;
  background: none;
  color: white;
  border: none;
}

@media (max-width: 768px) {
  .menu-toggle {
    display: block;
  }

  .nav-links {
    display: none;
    flex-direction: column;
    margin-top: 20px;
  }

  .nav-links.active {
    display: flex;
  }
}

/* Hero */
.hero {
  padding: 80px 0;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 40px;
  align-items: center;
}

.hero h1 {
  font-size: 48px;
}

.hero p {
  margin-top: 20px;
  color: var(--muted);
}

/* Search */
.search {
  margin-top: 30px;
  display: flex;
  border-radius: 50px;
  overflow: hidden;
  border: 2px solid transparent;
  background: var(--gradient);
  padding: 2px;
}

.search input {
  flex: 1;
  padding: 15px;
  border: none;
  outline: none;
  background: black;
  color: white;
}

.search button {
  padding: 15px 20px;
  border: none;
  background: white;
  color: black;
  cursor: pointer;
}

/* Rating */
.rating {
  margin-top: 20px;
  color: white;
}

.rating span {
  color: var(--muted);
}

/* Image */
.hero-img img {
  max-width: 100%;
}

/* Responsive */
@media (max-width: 900px) {
  .grid {
    grid-template-columns: 1fr;
    text-align: center;
  }
}
      </style>

      <header class="header">
        <div class="container nav">
          <img class="logo" src="https://landingfoliocom.imgix.net/store/collection/dusk/images/logo.svg" />

          <button class="menu-toggle" onclick="toggleMenu()">☰</button>

          <nav class="nav-links" id="menu">
            <a href="#">Products</a>
            <a href="#">Features</a>
            <a href="#">Pricing</a>
            <a href="#">Support</a>
          </nav>

          <a href="#" class="btn">Start free trial</a>
        </div>
      </header>

      <section class="hero">
        <div class="container grid">
          
          <div>
            <h1>Connecting Devs with Employers</h1>
            <p>
              Amet minim mollit non deserunt ullamco est sit aliqua dolor do amet sint.
            </p>

            <form class="search">
              <input type="text" placeholder="Try Java Developer, React Dev etc." />
              <button>Find A Developer</button>
            </form>

            <div class="rating">
              ★★★★★ <span>4.1/5 (14k Reviews)</span>
            </div>
          </div>

          <div class="hero-img">
            <img src="https://landingfoliocom.imgix.net/store/collection/dusk/images/hero/2/illustration.png" />
          </div>

        </div>
      </section>

    </div>
 </foreignObject>
</svg>
